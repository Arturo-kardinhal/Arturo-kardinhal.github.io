<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>SHOP</title>
        <style>
            body {
                font-family: 'Poppins', sans-serif;
                margin: 0;
                padding: 0;
                background-color: #ffcccc;
                color: #333333;
                font-size: 16px;
            }
            header {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 16px;
                background-color: #ff3366;
                color: #ffffff;
                position: fixed;
                width: 100%;
                top: 0;
                left: 0;
                z-index: 1;
            }
            header h1 {
                font-weight: 700;
                font-size: 36px;
                margin: 0;
                padding: 0;
                text-transform: uppercase;
            }
            nav {
                display: flex;
                flex-direction: row;
            }
            nav ul {
                display: flex;
                flex-direction: row;
                margin: 0;
                padding: 0;
                list-style: none;
            }
            nav li {
                margin-left: 16px;
            }
            nav a {
                text-decoration: none;
                color: #ffffff;
                font-weight: 500;
                font-size: 18px;
                text-transform: uppercase;
            }
            main {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 120px 16px 16px;
                background-image: url("");
                background-size: cover;
                background-position: center center;
                background-repeat: no-repeat;
                position: relative;
                height: 100vh;
                margin-top: 80px;
            }
            main h2 {
                font-weight: 500;
                font-size: 36px;
                margin: 0;
                padding: 0;
                color: #ffffff;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
                text-align: center;
                max-width: 800px;
                margin-bottom: 32px;
            }
            main p {
                font-size: 24px;
                font-weight: 300;
                color: #ffffff;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
                text-align: center;
                max-width: 800px;
                margin-bottom: 48px;
            }
            main button {
                background-color: #ff3366;
                color: #ffffff;
                font-weight: 500;
                font-size: 18px;
                text-transform: uppercase;
                padding: 16px 24px;
                border-radius: 32px;
                border: none;
                    }
            main button:hover {
                background-color: #e6005c;
                transition: background-color 0.2s ease-in-out;
            }
            footer {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: center;
                padding: 16px;
                background-color: #ff3366;
                color: #ffffff;
                position: absolute;
                bottom: 0;
                width: 100%;
                z-index: 1;
            }
            footer p {
                margin: 0;
                padding: 0;
                font-size: 14px;
                font-weight: 300;
            }
            body, div {
            overflow: hidden;
            }
            .nav-item {
        margin-left: 30px;
    }
    
    .nav-item a {
        display: inline-block;
        width: 185px;
    }
    .ver-catalogo-btn {
      display: block;
      margin: auto;
    }
    
    
        </style>
	</head>
	<body>
		<header>
			<h1>Pleasure Palace - Catálogo</h1>
			<nav>
				<ul>
					<li class="nav-item"><a href="index.html">Inicio</a></li>
					<li class="nav-item"><a href="about_our_products.html">Nosotros</a></li>
					<li class="nav-item"><a href="catalogo.html">Catálogo</a></li>
				</ul>
			</nav>
		</header>
		<main>
			<h2>Página en desarrollo.</h2>
			<p>Estamos trabajando mucho para hacer esta página, por favor, ¡sé paciente mientras hacemos los últimos retoques!</p>
			<button class=".comprar-btn">Volver al inicio</button>
            
		</main>
        <script>
		const comprarBtn = document.querySelector('.comprar-btn');
		comprarBtn.addEventListener('click', function() {
			window.location.href = 'index.html';
		});
	</script>
		<footer>
			<p>Derechos reservados &copy; 2023</p>
		</footer>
       
	</body>
    
</html>
